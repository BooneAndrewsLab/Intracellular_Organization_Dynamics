name: cellprofiler_2.3.1_env
channels:
 - conda-forge
 - defaults
 - anaconda
dependencies:
 - python=2.7
 - pip
 - boto3
 - h5py<=2.7.0
 - inflect
 - matplotlib
 - mysqlclient
 - numpy<=1.13.0
 - pandas==0.19
 - pyzmq
 - scipy
 - scikit-image
 - scikit-learn
 - wxpython>=3.0
 - pip:
   - "--editable=git+https://github.com/CellProfiler/CellProfiler.git@v2.3.1#egg=cellprofiler"
   - centrosome
   - cellh5
   - prokaryote==2.3.3
   - python-bioformats==1.4.0
   - javabridge==1.0.4
